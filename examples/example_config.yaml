data:
  path: ../MODELE_COX/data/synthetic_dataset.xlsx
  sheet_name: essais
  target_time: Y_time
  target_event: Y_event
  features:
    continuous:
      - X1_cont
      - X2_cont
      - X3_cont
      - X4_cont
      - X5_cont
    categorical:
      - X6_cat
      - X7_cat
      - X8_cat
    categorical_levels:
      X6_cat: [A, B, C]
      X7_cat: [M1, M2]
      X8_cat: [L1, L2, L3, L4, L5]

model:
  penalizer: 0.01
  time_horizons: [10, 20, 30, 45, 60]

validation:
  cv_folds: 5
  bootstrap_n_iter: 200
  random_state: 42
  auc_n_times: 20
  pit_band: [0.8, 1.0]

outputs:
  dir: outputs

sensitivity:
  variable: X1_cont
  n_curves: 6
  fixed_values:
    X2_cont: 0.5
    X3_cont: -0.2
    X4_cont: 1.0
    X5_cont: 0.0
    X6_cat_B: 1.0
    X6_cat_C: 0.0
    X7_cat_M2: 0.0
    X8_cat_L2: 0.0
    X8_cat_L3: 1.0
    X8_cat_L4: 0.0
    X8_cat_L5: 0.0
